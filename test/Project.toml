# Bounded compat for the seeded QA + AD deps (mirrors CensoredDistributions.jl).
# The package under test and EpiAwarePackageTools are pinned by `[sources]`, so
# they carry no compat entry. Add a bound for each test-only dep you add.
[compat]
ADTypes = "1"
AdvancedMH = "0.8"
Aqua = "0.8"
BenchmarkTools = "1.4"
Bijectors = "0.13, 0.14, 0.15, 0.16"
ComposedDistributions = "0.1"
DifferentiationInterface = "0.6, 0.7"
DifferentiationInterfaceTest = "0.9, 0.10"
Distributions = "0.25"
Documenter = "1"
DynamicPPL = "0.39, 0.40, 0.41, 0.42"
ExplicitImports = "1"
FlexiChains = "0.4, 0.5, 0.6"
ForwardDiff = "0.10, 1"
JET = "0.10.2, 0.11"
JuliaFormatter = "2"
LinearAlgebra = "1"
LogDensityProblems = "2"
ModifiedDistributions = "0.1"
Pkg = "1"
Statistics = "1"
Test = "1"
TestItemRunner = "1"
TestItems = "1"
Turing = "0.42, 0.43, 0.44, 0.45"

[sources]
DistributionsInference = {path = ".."}
# ComposedDistributions is unregistered, so it is pinned by git until it
# registers (mirrors ModifiedDistributions.jl's own test env pin).
ComposedDistributions = {rev = "main", url = "https://github.com/EpiAware/ComposedDistributions.jl"}
# ModifiedDistributions is unregistered, so it is pinned by git until it
# registers (mirrors its own test env's ComposedDistributions pin).
ModifiedDistributions = {rev = "main", url = "https://github.com/EpiAware/ModifiedDistributions.jl"}
# Until EpiAwarePackageTools is registered, it is pinned by git so
# the env resolves out of the box. Switch to a local path to
# develop the kit alongside this package.
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}
